name: task4_analyze_plots
agent: report_analyzer
description: >
  Baseado no arquivo `{pdf_report}` e no catálogo de visualizações extraído na tarefa anterior,
  realize uma análise profunda de cada gráfico para gerar insights significativos e validação de dados.
  Para cada visualização:

  1. **Análise de Dados:** Identifique tendência, padrão, mudanças percentuais, outliers, correlações.
  2. **Validação de Qualidade:** Verifique inconsistências, escala adequada, distorções visuais.
  3. **Contexto e Significado:** O que comunica, implicações, narrativa construída.
  4. **Insights Acionáveis:** Achados principais, áreas de preocupação ou celebração.

  Considere que estes dados serão avaliados sob a perspectiva dos critérios CAPES de avaliação de
  pós-graduação.
expected_output: >
  Um objeto JSON contendo análises estruturadas para cada gráfico, incluindo:

  - analise_dados: Tendência, valores-chave, outliers, comparações
  - validacao: Completude dos dados, inconsistências, qualidade geral
  - contexto: O que comunica, implicações, narrativa
  - insights: Achados principais, pontos positivos, áreas de preocupação
  - recomendacoes: Ações de melhoria, investigação ou ação
  - sintese_geral: Padrões globais, coerência narrativa, força evidencial

  Retorne APENAS o objeto JSON estruturado, sem explicações adicionais.
markdown: false
