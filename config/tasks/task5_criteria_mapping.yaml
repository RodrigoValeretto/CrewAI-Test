name: task5_criteria_mapping
agent: report_analyzer
description: >
  Realize o cruzamento final de conformidade entre os critérios extraídos da Ficha de Avaliação
  e as análises das visualizações. Para cada gráfico do APOEMA:

  1. **Mapeamento de Critérios:** Identifique qual Quesito e Indicador específico da CAPES endereça.
  Classifique o alinhamento como Total, Parcial ou Desalinhado.
  2. **Auditoria de Cobertura:** Identifique critérios de alto peso sem representação visual.
  3. **Cálculo de Risco:** Determine o nível de risco de avaliação negativa por quesito.
  4. **Redação do Relatório Final:** Traduza inteligência técnica em relatório textual organizado.
expected_output: >
  Um relatório detalhado em Markdown com:

  - **Diagnóstico de Conformidade CAPES:** Resumo executivo e score geral (0-100%).
  - **Análise por Quesito:** Gráficos associados, status de evidência, nível de risco, diagnóstico.
  - **Lacunas de Evidência:** Critérios ausentes e sugestões de dados necessários.
  - **Recomendações Estratégicas:** Ações prioritárias para melhorar conformidade.

  Use apenas listas (bullets) e negrito. Proibido uso de tabelas (|---|).
markdown: true
