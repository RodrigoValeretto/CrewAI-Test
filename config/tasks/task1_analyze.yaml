name: task1_analyze
agent: data_reader
description: >
  Realize uma análise técnica e estrutural do conteúdo extraído da ficha de avaliação da CAPES
  fornecida no campo `{ASSESSMENT_DATA}`. O objetivo é transformar a transcrição bruta em um
  esquema lógico de critérios de avaliação.

  Você deve identificar e mapear obrigatoriamente:

  1. **Metadados da Ficha:** Área de avaliação, Quadriênio e data de publicação.
  2. **Taxonomia da Avaliação:** Mapeie a hierarquia de Quesitos, Itens e Indicadores.
  3. **Métricas de Desempenho:** Extraia indicadores quantitativos e qualitativos exigidos.
  4. **Réguas de Nota:** Identifique critérios que diferenciam programas de diferentes notas.
  5. **Vínculo com o APOEMA:** Identifique critérios representáveis por dados de produção, corpo
  docente ou discente.

  A resposta deve ser rigorosamente em português-brasileiro e formatada como um objeto JSON puro,
  sem textos explicativos fora do bloco de código.
expected_output: >
  Um objeto JSON estruturado que funcione como um "Mapa de Calor de Importância", contendo:

  - `area_conhecimento`: Nome da área.
  - `quadrienio`: Período de referência.
  - `estrutura_quesitos`: Array de objetos contendo nome_quesito, peso_relativo e indicadores_chave.
  - `criterios_sucesso`: Descrição do que é necessário para atingir notas superiores.
  - `mapeamento_apoema`: Sugestões de quais tipos de dados devem ser cruzados com esta ficha.
